apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
data:
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KEYCLOAK_ISSUER_URI: https://keycloak-platform.apps-crc.testing/realms/master
  NOTIFICATION_TOPICS: order.events,payment.events,shipping.events
  SERVER_PORT: "8443"
  SERVER_SSL_ENABLED: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
          envFrom:
            - configMapRef:
                name: notification-service-config
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Djavax.net.ssl.trustStore=/etc/ssl/openshift/truststore.jks -Djavax.net.ssl.trustStorePassword=changeit"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8443
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8443
              scheme: HTTPS
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: truststore
              mountPath: /etc/ssl/openshift
              readOnly: true
            - name: service-tls
              mountPath: /etc/tls
              readOnly: true
      volumes:
        - name: truststore
          secret:
            secretName: platform-truststore
        - name: service-tls
          secret:
            secretName: notification-service-tls
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: notification-service-tls
spec:
  selector:
    app: notification-service
  ports:
    - port: 8443
      targetPort: 8443
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: notification-service
spec:
  host: notification-service-platform.apps-crc.testing
  to:
    kind: Service
    name: notification-service
  port:
    targetPort: 8443
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
