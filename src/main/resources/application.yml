server:
  port: ${SERVER_PORT:8089}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    certificate: ${SERVER_SSL_CERT:/etc/tls/tls.crt}
    certificate-private-key: ${SERVER_SSL_KEY:/etc/tls/tls.key}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  application:
    name: notification-service
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka.${PLATFORM_NAMESPACE:platform}.svc.cluster.local:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:SCRAM-SHA-512}
      sasl.jaas.config: org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME:}" password="${KAFKA_PASSWORD:}";
      ssl.truststore.location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:/etc/kafka/truststore.jks}
      ssl.truststore.password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD:changeit}
      ssl.truststore.type: ${KAFKA_SSL_TRUSTSTORE_TYPE:JKS}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloak-platform.${APP_BASE_DOMAIN:apps.example.invalid}/realms/master}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak.${PLATFORM_NAMESPACE:platform}.svc.cluster.local/realms/master/protocol/openid-connect/certs}

notification:
  topics: ${NOTIFICATION_TOPICS:order.events,payment.events,shipping.events}
  mail:
    enabled: ${NOTIFICATION_MAIL_ENABLED:false}
    from: ${NOTIFICATION_MAIL_FROM:no-reply@tsatech.local}

management:
  health:
    mail:
      enabled: ${NOTIFICATION_MAIL_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info

cms:
  settings:
    runtime-url: ${CMS_SETTINGS_RUNTIME_URL:http://cms-service.${APP_NAMESPACE:ecommerce}.svc.cluster.local:8443/api/cms/settings/runtime}
    internal-token: ${CMS_INTERNAL_TOKEN:}
